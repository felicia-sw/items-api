name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build the new binary
        run: go build -o itemsapi .

      - name: Install and restart (stop old, run new)
        run: |
          install -m 755 itemsapi /opt/itemsapi/itemsapi
          sudo systemctl restart itemsapi

      - name: Health check
        run: |
          sleep 2
          curl -fsS http://127.0.0.1:8080/items > /dev/null
          echo "deploy OK"
